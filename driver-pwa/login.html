<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0f1e" />
  <title>3 Lakes Driver — Login</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    :root {
      --bg:     #0a0f1e;
      --surface: #111827;
      --card:   #1a2235;
      --border: #2a3550;
      --accent: #3b82f6;
      --green:  #22c55e;
      --red:    #ef4444;
      --text:   #f1f5f9;
      --muted:  #64748b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    body { display: flex; align-items: center; justify-content: center; }
    .login-container { width: 100%; max-width: 400px; padding: 20px; }
    .login-header { text-align: center; margin-bottom: 40px; }
    .logo { font-size: 32px; font-weight: 700; color: var(--accent); margin-bottom: 8px; }
    .logo span { color: var(--text); }
    .tagline { font-size: 14px; color: var(--muted); }
    .form-group { margin-bottom: 20px; }
    .form-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .form-input { width: 100%; padding: 12px 16px; font-size: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; color: var(--text); }
    .form-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    .pin-input { letter-spacing: 8px; text-align: center; font-size: 24px; font-weight: 700; }
    .form-hint { font-size: 11px; color: var(--muted); margin-top: 6px; }
    .btn-login { width: 100%; padding: 14px; margin-top: 28px; font-size: 16px; font-weight: 700; background: var(--accent); color: #fff; border: none; border-radius: 10px; cursor: pointer; transition: background .2s; }
    .btn-login:hover { background: #2563eb; }
    .btn-login:active { background: #1d4ed8; }
    .btn-login:disabled { background: var(--muted); cursor: not-allowed; }
    .error { display: none; padding: 12px; margin-bottom: 20px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: var(--red); font-size: 13px; }
    .error.show { display: block; }
    .loading { display: none; text-align: center; font-size: 14px; color: var(--muted); }
    .loading.show { display: block; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--accent); border-top-color: transparent; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .info-box { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin-top: 24px; font-size: 12px; color: var(--muted); line-height: 1.6; }
    .info-box strong { color: var(--text); }
  </style>
</head>
<body>

<div class="login-container">
  <div class="login-header">
    <div class="logo">3 Lakes <span>Driver</span></div>
    <div class="tagline">Mobile Dispatch & Earnings</div>
  </div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div id="error" class="error"></div>
    <div id="loading" class="loading">
      <div class="spinner"></div> Signing you in...
    </div>

    <div class="form-group">
      <label class="form-label">Phone Number</label>
      <input
        id="phone"
        type="tel"
        class="form-input"
        placeholder="(312) 555-0100"
        inputmode="tel"
        autocomplete="tel"
        required
      />
      <div class="form-hint">10-digit US number or international +1</div>
    </div>

    <div class="form-group">
      <label class="form-label">4-Digit PIN</label>
      <input
        id="pin"
        type="password"
        class="form-input pin-input"
        placeholder="••••"
        inputmode="numeric"
        maxlength="4"
        minlength="4"
        required
      />
      <div class="form-hint">Your secure login PIN (not your password)</div>
    </div>

    <button id="login-btn" type="submit" class="btn-login">Sign In</button>
  </form>

  <div class="info-box">
    <strong>Demo Account:</strong><br>
    Phone: <code style="color:var(--accent)">(312) 555-0100</code><br>
    PIN: <code style="color:var(--accent)">1234</code><br><br>
    This will connect you to your 3 Lakes driver dashboard.
  </div>
</div>

<script>
const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
  ? 'http://localhost:8080' : '';

async function handleLogin(event) {
  event.preventDefault();

  const phone = document.getElementById('phone').value.trim();
  const pin = document.getElementById('pin').value.trim();
  const errorEl = document.getElementById('error');
  const loadingEl = document.getElementById('loading');
  const btnEl = document.getElementById('login-btn');

  // Reset error
  errorEl.classList.remove('show');
  errorEl.textContent = '';

  // Validate
  const digits = phone.replace(/\D/g, '');
  if (digits.length < 10) {
    errorEl.textContent = '⚠️ Please enter a valid 10-digit phone number';
    errorEl.classList.add('show');
    return;
  }

  if (pin.length !== 4 || !/^\d+$/.test(pin)) {
    errorEl.textContent = '⚠️ PIN must be exactly 4 digits';
    errorEl.classList.add('show');
    return;
  }

  // Show loading
  loadingEl.classList.add('show');
  btnEl.disabled = true;

  try {
    const res = await fetch(API + '/api/driver-auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ phone, pin })
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error(data.detail || 'Login failed');
    }

    // Store token
    localStorage.setItem('3ll_token', data.token);
    localStorage.setItem('3ll_driver_id', data.driver_id);
    localStorage.setItem('3ll_driver_name', data.driver_name);
    localStorage.setItem('3ll_carrier_id', data.carrier_id);
    localStorage.setItem('3ll_expires_at', data.expires_at);

    // Redirect to main app
    window.location.href = './index.html';

  } catch (err) {
    errorEl.textContent = '⚠️ ' + (err.message || 'Login failed. Check phone and PIN.');
    errorEl.classList.add('show');
    loadingEl.classList.remove('show');
    btnEl.disabled = false;
  }
}

// PIN input formatting (show only dots)
document.getElementById('pin').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/[^\d]/g, '').substring(0, 4);
});

// Phone input formatting
document.getElementById('phone').addEventListener('input', (e) => {
  const digits = e.target.value.replace(/\D/g, '');
  let formatted = digits;
  if (digits.length >= 6) {
    formatted = '(' + digits.slice(0, 3) + ') ' + digits.slice(3, 6) + '-' + digits.slice(6, 10);
  } else if (digits.length >= 3) {
    formatted = '(' + digits.slice(0, 3) + ') ' + digits.slice(3);
  }
  e.target.value = formatted.substring(0, 14);
});

// Register service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>

</body>
</html>
